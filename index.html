<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>單字小鎮 Word Town｜高中英文單字探索遊戲</title>
<style>
:root{
  --ui-navy:#171a30; --ui-navy2:#20243f; --ui-line:#3a3f66;
  --ink:#f4f5ff; --ink-dim:#a8adce;
  --gold:#ffd94a; --coral:#ff7a59; --mint:#57d9a3; --sky:#63b3ff; --rose:#ff6b8a;
  --grass:#67b445; --wood:#c89b62;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#0d0f1e;
  font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
  color:var(--ink);touch-action:none;overscroll-behavior:none}
button{font-family:inherit;cursor:pointer;border:none}
#game{position:fixed;inset:0;display:block}
canvas{image-rendering:pixelated;display:block}

/* ── 頂部 HUD ── */
#hud{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;gap:8px;
  padding:calc(6px + env(safe-area-inset-top)) 10px 6px;z-index:20;pointer-events:none}
.hud-chip{background:rgba(23,26,48,.88);border:1px solid var(--ui-line);border-radius:12px;
  padding:6px 10px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;
  pointer-events:auto;box-shadow:0 3px 0 rgba(0,0,0,.35)}
.hud-chip small{color:var(--ink-dim);font-weight:500}
#hudName{max-width:32vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hud-spacer{flex:1}
.hud-btn{background:var(--ui-navy2);border:1px solid var(--ui-line);color:var(--ink);
  border-radius:12px;width:38px;height:38px;font-size:17px;pointer-events:auto;
  box-shadow:0 3px 0 rgba(0,0,0,.35);display:grid;place-items:center}
.hud-btn:active{transform:translateY(2px);box-shadow:none}

/* ── 虛擬搖桿與互動鈕 ── */
#dpad{position:fixed;left:14px;bottom:calc(16px + env(safe-area-inset-bottom));z-index:20;
  display:grid;grid-template-columns:repeat(3,56px);grid-template-rows:repeat(3,56px);gap:4px;opacity:.92}
.dbtn{background:rgba(23,26,48,.85);border:1px solid var(--ui-line);border-radius:14px;
  color:var(--ink);font-size:22px;user-select:none;display:grid;place-items:center;
  box-shadow:0 4px 0 rgba(0,0,0,.4)}
.dbtn:active,.dbtn.on{background:var(--sky);color:#10203a;transform:translateY(2px);box-shadow:none}
#dU{grid-area:1/2}#dL{grid-area:2/1}#dR{grid-area:2/3}#dD{grid-area:3/2}
#actBtn{position:fixed;right:16px;bottom:calc(26px + env(safe-area-inset-bottom));z-index:20;
  width:86px;height:86px;border-radius:50%;background:var(--gold);color:#4a3200;
  font-size:15px;font-weight:900;border:4px solid #b98d00;box-shadow:0 6px 0 #8a6800;
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:2px;line-height:1.1}
#actBtn.show{display:flex;animation:pop .25s}
#actBtn:active{transform:translateY(4px);box-shadow:0 2px 0 #8a6800}
#actBtn .ico{font-size:26px}
@keyframes pop{from{transform:scale(.6)}to{transform:scale(1)}}

/* ── 提示泡泡 ── */
#toast{position:fixed;left:50%;top:calc(60px + env(safe-area-inset-top));transform:translateX(-50%);
  background:rgba(23,26,48,.94);border:1px solid var(--gold);color:var(--gold);border-radius:14px;
  padding:9px 16px;font-size:14px;font-weight:700;z-index:60;display:none;max-width:88vw;text-align:center}
#toast.show{display:block;animation:pop .2s}

/* ── 通用面板 ── */
.overlay{position:fixed;inset:0;background:rgba(8,9,20,.72);z-index:40;display:none;
  align-items:center;justify-content:center;padding:12px}
.overlay.show{display:flex}
.panel{background:var(--ui-navy);border:2px solid var(--ui-line);border-radius:20px;
  width:min(560px,96vw);max-height:min(92dvh,860px);display:flex;flex-direction:column;
  box-shadow:0 20px 60px rgba(0,0,0,.6);overflow:hidden;animation:pop .22s}
.p-head{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--ui-line);
  background:linear-gradient(180deg,#242849,#1b1e38)}
.p-head h2{font-size:17px;flex:1;letter-spacing:1px}
.p-head .sub{font-size:12px;color:var(--ink-dim);font-weight:500}
.xbtn{background:var(--ui-navy2);border:1px solid var(--ui-line);color:var(--ink);width:34px;height:34px;
  border-radius:10px;font-size:15px}
.p-body{padding:14px 16px;overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y}
.p-body::-webkit-scrollbar{width:6px}.p-body::-webkit-scrollbar-thumb{background:var(--ui-line);border-radius:3px}

.btn{border-radius:14px;padding:12px 16px;font-size:15px;font-weight:800;color:#10203a;
  background:var(--sky);box-shadow:0 4px 0 rgba(0,0,0,.35);display:inline-flex;align-items:center;gap:8px;justify-content:center}
.btn:active{transform:translateY(3px);box-shadow:none}
.btn.gold{background:var(--gold);color:#4a3200}
.btn.mint{background:var(--mint);color:#083b28}
.btn.rose{background:var(--rose);color:#fff}
.btn.ghost{background:var(--ui-navy2);color:var(--ink);border:1px solid var(--ui-line)}
.btn.block{width:100%}
.btn:disabled{opacity:.4;pointer-events:none}
.btn.sm{padding:8px 12px;font-size:13px;border-radius:11px}

.tag{display:inline-block;background:var(--ui-navy2);border:1px solid var(--ui-line);border-radius:8px;
  padding:2px 8px;font-size:12px;color:var(--ink-dim);font-weight:700}
.spk{background:var(--ui-navy2);border:1px solid var(--sky);color:var(--sky);border-radius:50%;
  width:34px;height:34px;font-size:15px;flex:none}
.spk:active{background:var(--sky);color:#10203a}

/* 關卡分頁 */
.lv-tabs{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.lv-tab{flex:1;min-width:100px;background:var(--ui-navy2);border:1px solid var(--ui-line);color:var(--ink-dim);
  border-radius:12px;padding:9px 6px;font-size:13px;font-weight:800;text-align:center}
.lv-tab.on{background:var(--gold);color:#4a3200;border-color:var(--gold)}
.lv-tab.lock{opacity:.45}

/* 教學卡片 */
.wcard{background:linear-gradient(160deg,#fff8e3,#ffedc2);color:#3c2f13;border-radius:18px;
  padding:20px 18px;text-align:center;border:3px solid #e8c877;position:relative}
.wcard .num{position:absolute;top:-12px;left:14px;background:var(--sky);color:#10203a;
  border-radius:10px;padding:3px 10px;font-size:13px;font-weight:900}
.wcard h3{font-size:34px;letter-spacing:1px;margin:8px 0 2px;font-weight:900}
.wcard .kk{color:#8a6d2f;font-size:15px}
.wcard .zh{font-size:19px;font-weight:800;margin:8px 0 4px}
.wcard .sen{background:rgba(255,255,255,.65);border-radius:12px;padding:10px 12px;margin-top:12px;
  font-size:15px;text-align:left;line-height:1.55}
.wcard .sen b{color:#c25b1e}
.wcard .senzh{font-size:13px;color:#6f5a26;margin-top:4px}
.card-nav{display:flex;gap:8px;margin-top:12px;align-items:center}
.card-nav .btn{flex:1}
.wlist{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.wl-item{background:var(--ui-navy2);border:1px solid var(--ui-line);border-radius:12px;padding:9px 10px;
  font-size:14px;font-weight:700;display:flex;align-items:center;gap:7px;color:var(--ink)}
.wl-item .st{margin-left:auto;font-size:12px}
.wl-item.done{border-color:var(--mint)}

/* 練習/測驗 */
.q-word{font-size:30px;font-weight:900;text-align:center;margin:6px 0;letter-spacing:1px}
.q-zh{font-size:22px;font-weight:800;text-align:center;margin:6px 0}
.q-sen{background:var(--ui-navy2);border:1px solid var(--ui-line);border-radius:12px;padding:12px;
  font-size:16px;line-height:1.6;text-align:center;margin:8px 0}
.opts{display:grid;gap:9px;margin-top:12px}
.opt{background:var(--ui-navy2);border:2px solid var(--ui-line);color:var(--ink);border-radius:13px;
  padding:13px 12px;font-size:16px;font-weight:800;text-align:center}
.opt:active{border-color:var(--sky)}
.opt.ok{background:#1d4d38;border-color:var(--mint);color:var(--mint)}
.opt.ng{background:#542230;border-color:var(--rose);color:var(--rose)}
.prog{height:10px;background:var(--ui-navy2);border-radius:5px;overflow:hidden;margin:4px 0 10px}
.prog i{display:block;height:100%;background:linear-gradient(90deg,var(--sky),var(--mint));border-radius:5px;transition:width .3s}
.spell-slots{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin:10px 0}
.slot{width:34px;height:42px;background:#fff8e3;color:#3c2f13;border-radius:8px;border:2px solid #e8c877;
  font-size:20px;font-weight:900;display:grid;place-items:center}
.letters{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:8px}
.lt{width:40px;height:44px;background:var(--sky);color:#10203a;border-radius:9px;font-size:19px;font-weight:900;
  box-shadow:0 3px 0 rgba(0,0,0,.35)}
.lt:disabled{opacity:.25}
.fb{text-align:center;font-size:16px;font-weight:900;min-height:24px;margin-top:8px}
.fb.ok{color:var(--mint)}.fb.ng{color:var(--rose)}

/* 儀表板 */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:12px}
.stat{background:var(--ui-navy2);border:1px solid var(--ui-line);border-radius:14px;padding:11px;text-align:center}
.stat b{display:block;font-size:22px;color:var(--gold)}
.stat span{font-size:12px;color:var(--ink-dim)}
.bar-row{display:flex;align-items:center;gap:9px;margin:7px 0;font-size:13px}
.bar-row .lb{width:120px;flex:none;font-weight:700}
.bar-row .bar{flex:1;height:14px;background:var(--ui-navy2);border-radius:7px;overflow:hidden}
.bar-row .bar i{display:block;height:100%;border-radius:7px}
.bar-row .pc{width:42px;text-align:right;color:var(--ink-dim);font-weight:700}
.wgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.wchip{border-radius:9px;padding:6px 4px;text-align:center;font-size:12px;font-weight:800;
  background:var(--ui-navy2);border:1px solid var(--ui-line);color:var(--ink-dim)}
.wchip.m1{border-color:var(--rose);color:var(--rose)}
.wchip.m2{border-color:var(--gold);color:var(--gold)}
.wchip.m3{border-color:var(--mint);color:var(--mint)}
table.rec{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px}
table.rec th,table.rec td{border-bottom:1px solid var(--ui-line);padding:7px 5px;text-align:center}
table.rec th{color:var(--ink-dim);font-weight:700}
h4.sec{margin:16px 0 6px;font-size:14px;color:var(--sky);letter-spacing:1px}

/* 任務清單 */
.ms{display:flex;align-items:center;gap:10px;background:var(--ui-navy2);border:1px solid var(--ui-line);
  border-radius:13px;padding:11px 12px;margin-bottom:8px;font-size:14px;font-weight:700}
.ms .ck{width:26px;height:26px;border-radius:8px;background:var(--ui-navy);border:2px solid var(--ui-line);
  display:grid;place-items:center;flex:none;font-size:14px}
.ms.done .ck{background:var(--mint);border-color:var(--mint);color:#083b28}
.ms.done{border-color:var(--mint)}
.ms small{display:block;color:var(--ink-dim);font-weight:500}

/* 開始畫面 */
#startScr{position:fixed;inset:0;z-index:80;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 30%,#2a3f75 0%,#141631 55%,#0b0c1c 100%);padding:16px}
.start-card{width:min(440px,94vw);text-align:center}
.logo-town{font-size:60px;line-height:1;filter:drop-shadow(0 6px 0 rgba(0,0,0,.4));animation:bob 2.4s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.start-card h1{font-size:34px;letter-spacing:6px;margin:10px 0 2px;color:var(--gold);
  text-shadow:0 4px 0 rgba(0,0,0,.5)}
.start-card .en{font-size:14px;color:var(--sky);letter-spacing:4px;font-weight:800}
.start-card p{font-size:14px;color:var(--ink-dim);margin:14px 0;line-height:1.7}
#nameInput{width:100%;padding:13px 14px;border-radius:14px;border:2px solid var(--ui-line);
  background:var(--ui-navy2);color:var(--ink);font-size:16px;text-align:center;font-weight:800;outline:none;margin-bottom:12px}
#nameInput:focus{border-color:var(--gold)}
.result-big{font-size:52px;text-align:center;margin:6px 0}
.result-score{font-size:40px;font-weight:900;text-align:center;color:var(--gold)}
.rev{background:var(--ui-navy2);border:1px solid var(--ui-line);border-radius:11px;padding:9px 11px;
  margin-top:7px;font-size:13px;line-height:1.5}
.rev.ng{border-color:var(--rose)}
@media (orientation:landscape) and (max-height:520px){
  #dpad{grid-template-columns:repeat(3,48px);grid-template-rows:repeat(3,48px)}
  #actBtn{width:74px;height:74px}
  .panel{max-height:96dvh}
  .wcard h3{font-size:26px}
}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud">
  <div class="hud-chip" id="hudName">🎓 <span id="hudNameTxt">同學</span></div>
  <div class="hud-chip">🪙 <span id="hudCoin">0</span></div>
  <div class="hud-chip">⭐ <small>關卡</small> <span id="hudLv">1</span>/3</div>
  <div class="hud-spacer"></div>
  <button class="hud-btn" id="btnMission" title="任務">📜</button>
  <button class="hud-btn" id="btnDash" title="儀表板">📊</button>
  <button class="hud-btn" id="btnGear" title="設定">⚙️</button>
</div>

<div id="dpad">
  <button class="dbtn" id="dU">▲</button>
  <button class="dbtn" id="dL">◀</button>
  <button class="dbtn" id="dR">▶</button>
  <button class="dbtn" id="dD">▼</button>
</div>
<button id="actBtn"><span class="ico">💬</span><span id="actTxt">互動</span></button>
<div id="toast"></div>

<div class="overlay" id="modal">
  <div class="panel">
    <div class="p-head">
      <span id="mIcon" style="font-size:22px">📖</span>
      <h2 id="mTitle">標題<div class="sub" id="mSub"></div></h2>
      <button class="xbtn" id="mClose">✕</button>
    </div>
    <div class="p-body" id="mBody"></div>
  </div>
</div>

<div id="startScr">
  <div class="start-card">
    <div class="logo-town">🏘️</div>
    <h1>單字小鎮</h1>
    <div class="en">WORD TOWN · 24 WORDS ADVENTURE</div>
    <p>歡迎來到單字小鎮！你是新上任的<b style="color:var(--gold)">小鎮文化守護者</b>，<br>
    完成三大關卡任務：學會 24 個英文單字，<br>拯救小鎮的老街與寶藏。<br>
    <span style="color:var(--sky)">🕹️ 用方向鍵移動 → 走近建築 → 按黃色按鈕互動</span></p>
    <input id="nameInput" maxlength="12" placeholder="輸入你的名字（暱稱）">
    <button class="btn gold block" id="btnStart" style="font-size:18px">🚀 進入小鎮</button>
  </div>
</div>
<script>
"use strict";
/* ================== 單字資料（來源：英文單字卡1.png） ================== */
const WORDS=[
{id:1,en:"progress",pos:"n. / v.",kk:"/ˈprɑːɡres/",zh:"進步；進展",sen:"The town has made great progress in protecting its old streets.",senZh:"這個小鎮在保護老街方面有很大的進展。"},
{id:2,en:"preservation",pos:"n.",kk:"/ˌprezərˈveɪʃn/",zh:"保存；維護",sen:"The preservation of historic buildings is everyone's job.",senZh:"保存歷史建築是每個人的責任。"},
{id:3,en:"glimpse",pos:"n. / v.",kk:"/ɡlɪmps/",zh:"一瞥；瞥見",sen:"Visitors can catch a glimpse of the past in the old town.",senZh:"遊客可以在老城區一窺過去的樣貌。"},
{id:4,en:"identity",pos:"n.",kk:"/aɪˈdentəti/",zh:"身分；認同",sen:"These old temples are part of our cultural identity.",senZh:"這些古老的廟宇是我們文化認同的一部分。"},
{id:5,en:"development",pos:"n.",kk:"/dɪˈveləpmənt/",zh:"發展；開發",sen:"Rapid development often threatens historic neighborhoods.",senZh:"快速的開發常常威脅到歷史街區。"},
{id:6,en:"treasure",pos:"n. / v.",kk:"/ˈtreʒər/",zh:"寶藏；珍惜",sen:"The old library is a real treasure of our town.",senZh:"那座老圖書館是我們小鎮真正的寶藏。"},
{id:7,en:"replace",pos:"v.",kk:"/rɪˈpleɪs/",zh:"取代；替換",sen:"Nothing can replace these old photos of the town.",senZh:"沒有任何東西能取代這些小鎮的老照片。"},
{id:8,en:"endanger",pos:"v.",kk:"/ɪnˈdeɪndʒər/",zh:"危害；使遭受危險",sen:"Heavy traffic may endanger the ancient stone bridge.",senZh:"繁忙的交通可能會危害這座古老的石橋。"},
{id:9,en:"abundance",pos:"n.",kk:"/əˈbʌndəns/",zh:"豐富；充裕",sen:"The morning market offers an abundance of fresh fruit.",senZh:"早市提供豐富的新鮮水果。"},
{id:10,en:"campaign",pos:"n. / v.",kk:"/kæmˈpeɪn/",zh:"活動；運動",sen:"Students started a campaign to save the old theater.",senZh:"學生們發起了一場拯救老戲院的運動。"},
{id:11,en:"conclude",pos:"v.",kk:"/kənˈkluːd/",zh:"結束；下結論",sen:"The city tour will conclude at the museum.",senZh:"城市導覽將在博物館畫下句點。"},
{id:12,en:"transport",pos:"v. / n.",kk:"/trænˈspɔːrt/",zh:"運輸；運送",sen:"Workers transport the paintings to the gallery with care.",senZh:"工人們小心翼翼地將畫作運送到美術館。"},
{id:13,en:"situated",pos:"adj.",kk:"/ˈsɪtʃueɪtɪd/",zh:"位於；坐落於",sen:"Our school is situated near the train station.",senZh:"我們學校位於火車站附近。"},
{id:14,en:"drown",pos:"v.",kk:"/draʊn/",zh:"淹沒；溺水",sen:"The sound of birds was drowned out by the traffic.",senZh:"鳥叫聲被車流聲淹沒了。"},
{id:15,en:"spare",pos:"v. / adj.",kk:"/sper/",zh:"騰出；空閒的",sen:"Can you spare some time to visit the exhibition?",senZh:"你能騰出一些時間去看展覽嗎？"},
{id:16,en:"priceless",pos:"adj.",kk:"/ˈpraɪsləs/",zh:"無價的",sen:"The museum keeps many priceless treasures.",senZh:"博物館保存了許多無價的珍寶。"},
{id:17,en:"relieve",pos:"v.",kk:"/rɪˈliːv/",zh:"減輕；緩和",sen:"The new park helps relieve stress for busy residents.",senZh:"新公園幫助忙碌的居民減輕壓力。"},
{id:18,en:"urban",pos:"adj.",kk:"/ˈɜːrbən/",zh:"都市的；城市的",sen:"Urban life can be exciting but also stressful.",senZh:"都市生活可能很刺激，但也充滿壓力。"},
{id:19,en:"resident",pos:"n.",kk:"/ˈrezɪdənt/",zh:"居民",sen:"Local residents love the weekend flower market.",senZh:"當地居民很喜歡週末的花市。"},
{id:20,en:"crucial",pos:"adj.",kk:"/ˈkruːʃl/",zh:"關鍵的；至關重要的",sen:"Your help is crucial to the success of this mission.",senZh:"你的幫助對這項任務的成功至關重要。"},
{id:21,en:"urgent",pos:"adj.",kk:"/ˈɜːrdʒənt/",zh:"緊急的",sen:"The old bell tower needs urgent repairs after the storm.",senZh:"暴風雨過後，老鐘樓需要緊急修復。"},

function fresh(){

function load(){try{const d=JSON.parse(localStorage.getItem(SKEY));if(d&&d.words){const f=fresh();
  WORDS.forEach(w=>{d.words[w.id]=Object.assign({},f.words[w.id],d.words[w.id]||{})});

function mastery(id){const r=S.words[id];let m=0;
  if(r.seen>0)m+=15; if(r.learned)m+=15;
  const p=r.pc+r.pw, q=r.qc+r.qw;
  if(p>0)m+=35*(r.pc/p)*Math.min(1,p/3);
  if(q>0)m+=35*(r.qc/q)*Math.min(1,q/2);
  return Math.round(Math.min(100,m));}
function lvBest(i){const qs=S.quizzes.filter(q=>q.lv===i+1);return qs.length?Math.max(...qs.map(q=>q.score)):0;}

let AC=null,muted=false;
function ac(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)()}catch(e){}}
  if(AC&&AC.state==="suspended")AC.resume(); return AC;}
function tone(f,t0,dur,type="square",vol=.12){const c=ac();if(!c||muted)return;
  const o=c.createOscillator(),g=c.createGain();o.type=type;o.frequency.value=f;
  g.gain.setValueAtTime(vol,c.currentTime+t0);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+t0+dur);
  o.connect(g).connect(c.destination);o.start(c.currentTime+t0);o.stop(c.currentTime+t0+dur+.02);}
const SFX={
 step(){tone(190,0,.05,"triangle",.05)},
 open(){tone(520,0,.08);tone(780,.08,.1)},
 ok(){tone(660,0,.09);tone(880,.09,.14,"square",.14)},
 ng(){tone(180,0,.22,"sawtooth",.12)},
 coin(){tone(990,0,.07);tone(1320,.07,.16,"square",.13)},
 win(){[523,659,784,1046].forEach((f,i)=>tone(f,i*.11,.16,"square",.13))},
 pop(){tone(420,0,.06,"triangle",.1)}

  try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang=lang;
    u.rate=lang.startsWith("en")?0.92:1;
    const v=voices.find(v=>v.lang.replace("_","-").startsWith(lang))||voices.find(v=>v.lang.startsWith(lang.slice(0,2)));
    if(v)u.voice=v;speechSynthesis.speak(u);}catch(e){}}

function tryMove(dx,dy,dt){const sp=170*dt;let nx=player.x+dx*sp,ny=player.y+dy*sp;
  const r=13;
  if(!solid(tileAt(nx-r,player.y-4))&&!solid(tileAt(nx+r,player.y-4))&&!solid(tileAt(nx-r,player.y+r))&&!solid(tileAt(nx+r,player.y+r)))player.x=nx;
  if(!solid(tileAt(player.x-r,ny-4))&&!solid(tileAt(player.x+r,ny-4))&&!solid(tileAt(player.x-r,ny+r))&&!solid(tileAt(player.x+r,ny+r)))player.y=ny;
  player.x=Math.max(TILE*.4,Math.min(MW*TILE-TILE*.4,player.x));
  player.y=Math.max(TILE*.4,Math.min(MH*TILE-TILE*.4,player.y));}

let stepT=0;
function update(dt){
  let dx=0,dy=0;
  if(keys.ArrowLeft||keys.a)dx=-1;if(keys.ArrowRight||keys.d)dx=1;
  if(keys.ArrowUp||keys.w)dy=-1;if(keys.ArrowDown||keys.s)dy=1;
  player.moving=!!(dx||dy);
  if(player.moving){
    if(dx<0)player.dir=2;else if(dx>0)player.dir=3;else if(dy<0)player.dir=1;else player.dir=0;
    if(dx&&dy){dx*=.707;dy*=.707;}
    tryMove(dx,dy,dt);
    player.ft+=dt;if(player.ft>.16){player.ft=0;player.frame^=1;}
    stepT+=dt;if(stepT>.28){stepT=0;SFX.step();}
  }
  // NPC 漫遊
  npc.t-=dt;if(npc.t<=0){npc.t=1.5+Math.random()*2;npc.dir=Math.floor(Math.random()*5);}
  const nd=[[0,1],[0,-1],[-1,0],[1,0],[0,0]][npc.dir];
  let nnx=npc.x+nd[0]*40*dt,nny=npc.y+nd[1]*40*dt;
  if(nnx>10.5*TILE&&nnx<20*TILE&&!solid(tileAt(nnx,npc.y)))npc.x=nnx;
  if(nny>14*TILE&&nny<18.5*TILE&&!solid(tileAt(npc.x,nny)))npc.y=nny;
  // 偵測互動目標
  nearSt=null;nearEv=null;nearNpc=false;
  for(const st of stations){const d=Math.hypot((st.x+.5)*TILE-player.x,(st.y+.5)*TILE-player.y);
    if(d<TILE*1.15){nearSt=st;break;}}
  if(!nearSt){for(const ev of events){if(!ev.active)continue;
    const d=Math.hypot((ev.x+.5)*TILE-player.x,(ev.y+.5)*TILE-player.y);
    if(d<TILE*.95){nearEv=ev;break;}}}
  if(!nearSt&&!nearEv){if(Math.hypot(npc.x-player.x,npc.y-player.y)<TILE*1.1)nearNpc=true;}
  events.forEach(ev=>{if(!ev.active){ev.cd-=dt;if(ev.cd<=0)ev.active=true;}});
  updateActBtn();
}

  else if(nearNpc)label="和小婕聊天";
  if(label!==lastAct){lastAct=label;
    if(label){actTxt.textContent=label;actBtn.classList.add("show");}
    else actBtn.classList.remove("show");}}

function hash(x,y){let h=(x*374761393+y*668265263)^2654435761;h=(h^(h>>13))*1274126177;return ((h^(h>>16))>>>0)/4294967295;}
let T=0;
function draw(){
  cx.setTransform(dpr,0,0,dpr,0,0);
  cx.fillStyle="#0d0f1e";cx.fillRect(0,0,VW,VH);
  let camX=player.x-VW/(2*ZOOM),camY=player.y-VH/(2*ZOOM);
  camX=Math.max(0,Math.min(MW*TILE-VW/ZOOM,camX));
  camY=Math.max(0,Math.min(MH*TILE-VH/ZOOM,camY));
  if(MW*TILE<VW/ZOOM)camX=(MW*TILE-VW/ZOOM)/2;
  if(MH*TILE<VH/ZOOM)camY=(MH*TILE-VH/ZOOM)/2;
  cx.setTransform(dpr*ZOOM,0,0,dpr*ZOOM,-camX*dpr*ZOOM,-camY*dpr*ZOOM);
  const x0=Math.max(0,Math.floor(camX/TILE)),x1=Math.min(MW-1,Math.ceil((camX+VW/ZOOM)/TILE));
  const y0=Math.max(0,Math.floor(camY/TILE)),y1=Math.min(MH-1,Math.ceil((camY+VH/ZOOM)/TILE));
  // 地面層
  for(let y=y0;y<=y1;y++)for(let x=x0;x<=x1;x++){
    const c=map[y][x],px=x*TILE,py=y*TILE;
    if(c===","||c==="T"){
      cx.fillStyle=(x+y)%2?"#67b445":"#5fae3d";cx.fillRect(px,py,TILE,TILE);
      const h=hash(x,y);
      if(h>.86){cx.fillStyle="#8fd460";cx.fillRect(px+10,py+14,4,4);cx.fillRect(px+30,py+30,4,4);}
      if(h>.94){cx.fillStyle=h>.97?"#ffd94a":"#ff8fb0";cx.beginPath();cx.arc(px+24,py+22,3.4,0,7);cx.fill();}
    }else if(c==="r"){
      cx.fillStyle="#565b66";cx.fillRect(px,py,TILE,TILE);
      cx.fillStyle="#4b505a";if((x+y)%2)cx.fillRect(px,py,TILE,TILE);
      if(x===24){cx.fillStyle="#e0b73e";if(y%2)cx.fillRect(px+21,py+6,6,26);}
    }else if(c==="z"){
      cx.fillStyle="#565b66";cx.fillRect(px,py,TILE,TILE);
      cx.fillStyle="#e8e9ee";for(let i=0;i<3;i++)cx.fillRect(px+3,py+5+i*15,TILE-6,8);
    }else if(c==="."){
      cx.fillStyle=(x%2)?"#c89b62":"#c2925a";cx.fillRect(px,py,TILE,TILE);
      cx.strokeStyle="rgba(120,80,35,.35)";cx.lineWidth=1;
      cx.strokeRect(px+.5,py+.5,TILE,TILE/2);
    }else if(c==="#"){
      cx.fillStyle="#3f4468";cx.fillRect(px,py,TILE,TILE);
      cx.fillStyle="#575e8f";cx.fillRect(px,py,TILE,10);
      cx.fillStyle="#313552";cx.fillRect(px,py+TILE-8,TILE,8);
    }
  }
  // 地毯（會議室）
  cx.fillStyle="rgba(150,60,90,.45)";cx.fillRect(13.6*TILE,8.4*TILE,5.8*TILE,3.2*TILE);
  cx.strokeStyle="rgba(255,220,240,.5)";cx.strokeRect(13.8*TILE,8.6*TILE,5.4*TILE,2.8*TILE);
  // 家具
  furniture(x0,x1,y0,y1);
  // 樹
  for(let y=y0;y<=y1;y++)for(let x=x0;x<=x1;x++)if(map[y][x]==="T")tree(x*TILE,y*TILE);
  // 寶箱事件
  events.forEach(ev=>{if(!ev.active)return;const px=(ev.x+.5)*TILE,py=(ev.y+.5)*TILE;
    const b=Math.sin(T*4+ev.x)*3;
    cx.font="26px serif";cx.textAlign="center";cx.textBaseline="middle";
    cx.fillText("🎁",px,py+b-4);
    cx.fillStyle="rgba(255,217,74,"+(0.5+0.4*Math.sin(T*6))+")";
    cx.beginPath();cx.arc(px+13,py-16+b,3,0,7);cx.fill();
    cx.beginPath();cx.arc(px-14,py-8+b,2.4,0,7);cx.fill();});
  // 站點圖示與招牌
  stations.forEach(st=>{const m=stMeta[st.t],px=(st.x+.5)*TILE,py=(st.y+.5)*TILE;
    cx.fillStyle="rgba(255,255,255,.28)";cx.beginPath();cx.arc(px,py+8,17,0,7);cx.fill();
    cx.font="30px serif";cx.textAlign="center";cx.textBaseline="middle";
    cx.fillText(m.icon,px,py-2+Math.sin(T*3+st.x)*2.5);
    sign(px,py-TILE*.95,m.name);});
  // NPC
  sprite(npc.x,npc.y,"#ff8fb0","#7a3b52",Math.floor(T*4)%2,0);
  sign(npc.x,npc.y-TILE*.8,npc.name,true);
  // 玩家
  sprite(player.x,player.y,"#63b3ff","#274a86",player.frame,player.dir);
  sign(player.x,player.y-TILE*.85,S.name||"我",true,"#57d9a3");
  T+=1/60;
}
function sign(px,py,text,small,dot){
  cx.font=(small?"bold 11px":"bold 12px")+" 'Noto Sans TC',sans-serif";
  const w=cx.measureText(text).width+16;
  cx.fillStyle="rgba(15,17,35,.82)";

  if(dot){cx.fillStyle=dot;cx.beginPath();cx.arc(px-w/2+8,py,3,0,7);cx.fill();}
  cx.fillStyle="#fff";cx.textAlign="center";cx.textBaseline="middle";
  cx.fillText(text,px+(dot?4:0),py+1);

function rr(x,y,w,h,r){cx.beginPath();cx.moveTo(x+r,y);cx.arcTo(x+w,y,x+w,y+h,r);

function sprite(x,y,body,pants,frame,dir){
  const bob=frame?1.5:0;
  cx.fillStyle="rgba(0,0,0,.28)";cx.beginPath();cx.ellipse(x,y+16,12,5,0,0,7);cx.fill();

  cx.fillRect(x-8,y+6-bob,6,10+bob);cx.fillRect(x+2,y+6-(frame?0:1.5),6,10+(frame?0:1.5));

  // 頭
  cx.fillStyle="#ffd9b0";cx.beginPath();cx.arc(x,y-16-bob,10,0,7);cx.fill();
  // 髮/帽
  cx.fillStyle="#33507f";cx.beginPath();cx.arc(x,y-19-bob,10,Math.PI,0);cx.fill();
  cx.fillRect(x-10,y-20-bob,20,4);

  else if(dir===3){cx.fillRect(x+4.5,y-16-bob,2.5,3);}

/* ================== 題目產生器 ================== */
function pick(arr,n){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a.slice(0,n);}
function makeQ(w,type){
  const others=pick(WORDS.filter(x=>x.id!==w.id),3);
  if(type==="e2z"){const opts=pick([w.zh,...others.map(o=>o.zh)],4);
    return {w,type,stem:w.en,opts,ans:w.zh,say:w.en};}
  if(type==="z2e"){const opts=pick([w.en,...others.map(o=>o.en)],4);
    return {w,type,stem:w.zh,opts,ans:w.en,say:null};}
  if(type==="listen"){const opts=pick([w.en,...others.map(o=>o.en)],4);
    return {w,type,stem:"🎧 仔細聽，選出正確的單字",opts,ans:w.en,say:w.en};}
  // cloze 例句填空
  const blank=w.sen.replace(new RegExp("\\b"+w.en.slice(0,5)+"[a-z]*\\b","i"),"＿＿＿＿");
  const opts=pick([w.en,...others.map(o=>o.en)],4);
  return {w,type:"cloze",stem:blank,opts,ans:w.en,say:null,zh:w.senZh};}
function weightPick(ids,n){
  const pool=[];ids.forEach(id=>{const r=S.words[id];
    const wgt=Math.max(1,1+r.pw*2-r.pc*.4+(r.learned?0:1.5));
    for(let i=0;i<Math.round(wgt*2);i++)pool.push(id);});
  const out=[];while(out.length<n){const id=pool[Math.random()*pool.length|0];
    if(out.length===0||out[out.length-1]!==id||out.filter(x=>x===id).length<2)out.push(id);}
  return out;}

   💡 地圖導覽：📖 單字學堂＝教學｜🎯 練習公園＝練習｜🏆 挑戰塔＝測驗｜📊 儀表板＝學習紀錄<br>
   🎁 散落的寶箱與 🎀 小婕都會給你額外的單字挑戰！</div>`);}

/* ================== 📊 學習儀表板 ================== */
function fmtT(s){const m=Math.floor(s/60);return m>=60?`${Math.floor(m/60)}時${m%60}分`:`${m}分${s%60}秒`;}
function dashHtml(){
  const seen=WORDS.filter(w=>S.words[w.id].seen>0).length;
  const learned=WORDS.filter(w=>S.words[w.id].learned).length;
  const avgM=Math.round(WORDS.reduce((a,w)=>a+mastery(w.id),0)/24);
  const totP=WORDS.reduce((a,w)=>a+S.words[w.id].pc+S.words[w.id].pw,0);
  const accP=totP?Math.round(WORDS.reduce((a,w)=>a+S.words[w.id].pc,0)/totP*100):0;
  let html=`<div class="stat-grid">
    <div class="stat"><b>${avgM}%</b><span>平均精熟度</span></div>
    <div class="stat"><b>${learned}/24</b><span>已學會單字</span></div>
    <div class="stat"><b>${accP}%</b><span>練習正確率（${totP} 題）</span></div>
    <div class="stat"><b>${fmtT(S.time)}</b><span>累積學習時間</span></div></div>
   <h4 class="sec">⭐ 關卡進度</h4>`;
  LEVELS.forEach((L,i)=>{const m=Math.round(L.ids.reduce((a,id)=>a+mastery(id),0)/8);
    const col=lvPassed(i)?"var(--mint)":i+1<=S.unlocked?"var(--gold)":"var(--ui-line)";
    html+=`<div class="bar-row"><span class="lb">${lvPassed(i)?"🏅":i+1<=S.unlocked?"▶️":"🔒"} Level ${i+1}</span>
     <div class="bar"><i style="width:${m}%;background:${col}"></i></div><span class="pc">${m}%</span></div>`;});
  html+=`<h4 class="sec">🔤 24 單字精熟地圖（綠＝熟練、黃＝加強、紅＝待複習）</h4><div class="wgrid">`;
  html+=WORDS.map(w=>{const m=mastery(w.id);
    return `<button class="wchip ${m>=70?"m3":m>=35?"m2":m>0?"m1":""}" onclick="speak('${w.en}')">${w.en}<br><span style="font-size:11px">${m}%</span></button>`;}).join("")+`</div>`;
  html+=`<h4 class="sec">🏆 測驗紀錄（最近 8 筆）</h4>`;
  if(S.quizzes.length){html+=`<table class="rec"><tr><th>日期</th><th>關卡</th><th>分數</th><th>結果</th></tr>`+
    S.quizzes.slice(-8).reverse().map(q=>{const d=new Date(q.ts);
     return `<tr><td>${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}</td><td>L${q.lv}</td><td>${q.score}</td><td>${q.score>=PASS?"✅ 通過":"❌ 未過"}</td></tr>`;}).join("")+`</table>`;}
  else html+=`<div style="font-size:13px;color:var(--ink-dim)">尚無測驗紀錄，快去挑戰塔試試！</div>`;
  html+=`<h4 class="sec">🎁 情境事件</h4><div style="font-size:13px;color:var(--ink-dim)">完成 ${S.events.done} 次寶箱挑戰，答對 ${S.events.ok} 次</div>
   <button class="btn ghost block sm" style="margin-top:14px" onclick="exportCSV()">⬇️ 匯出學習紀錄 CSV</button>`;
  return html;}
function openDash(){openModal("📊","學習儀表板",(S.name||"同學")+" 的學習歷程",dashHtml());}
window.exportCSV=function(){
  let csv="\uFEFF學生,"+(S.name||"")+"\n單字,中文,看過次數,已學會,練習對,練習錯,測驗對,測驗錯,精熟度%\n";
  WORDS.forEach(w=>{const r=S.words[w.id];
    csv+=`${w.en},${w.zh},${r.seen},${r.learned?"是":"否"},${r.pc},${r.pw},${r.qc},${r.qw},${mastery(w.id)}\n`;});
  csv+="\n測驗紀錄\n關卡,分數,時間\n";
  S.quizzes.forEach(q=>{csv+=`L${q.lv},${q.score},${new Date(q.ts).toLocaleString("zh-TW")}\n`;});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"}));
  a.download=`單字小鎮_${S.name||"學生"}_學習紀錄.csv`;a.click();toast("⬇️ 已匯出 CSV");};

/* ================== 🔑 教師模式 ================== */
function openTeacher(){
  openModal("🔑","教師辦公室","教師模式（需通行碼）",`
   <p style="font-size:13px;color:var(--ink-dim);margin-bottom:10px">此區供老師檢視與管理學生學習紀錄。</p>
   <input id="pwIn" type="password" inputmode="numeric" placeholder="輸入教師通行碼" style="width:100%;padding:12px;border-radius:12px;border:2px solid var(--ui-line);background:var(--ui-navy2);color:var(--ink);font-size:16px;text-align:center;margin-bottom:10px">
   <button class="btn gold block" onclick="checkPw()">解鎖</button>`);}
window.checkPw=function(){
  if(document.getElementById("pwIn").value===TEACHER_PW){SFX.ok();renderTeacher();}
  else{SFX.ng();toast("❌ 通行碼錯誤");}};
function renderTeacher(){
  mIcon.textContent="🧑‍🏫";mTitle.childNodes[0].nodeValue="教師模式";mSub.textContent="學生："+(S.name||"未命名");
  mBody.innerHTML=`
   ${dashHtml()}
   <h4 class="sec">🛠️ 教師管理工具</h4>
   <div style="display:grid;gap:8px">
    <button class="btn mint block sm" onclick="S.unlocked=3;save();refreshHud();toast('🗝️ 已為學生解鎖全部關卡')">🗝️ 解鎖全部關卡</button>
    <button class="btn ghost block sm" onclick="speechSynthesis.cancel();S.coins+=50;save();refreshHud();toast('🪙 已發放 50 金幣獎勵')">🎁 發放 50 金幣獎勵</button>
    <button class="btn rose block sm" onclick="if(confirm('確定要清空這位學生的所有學習紀錄嗎？此動作無法復原。')){const n=S.name;S=fresh();S.name=n;save();refreshHud();renderTeacher();toast('🧹 紀錄已重置');}">🧹 重置學習紀錄</button>
   </div>
   <p style="font-size:12px;color:var(--ink-dim);margin-top:12px;line-height:1.7">
   📌 使用建議：學生以個人手機或平板遊玩，紀錄儲存於裝置瀏覽器（localStorage）。
   課堂結束前請學生按「匯出 CSV」繳交，即可彙整全班學習成效。</p>`;
  mBody.scrollTop=0;}

/* ================== ⚙️ 設定 ================== */
function openGear(){
  openModal("⚙️","設定","",`
   <div style="display:grid;gap:9px">
    <button class="btn ghost block" onclick="muted=!muted;this.textContent=muted?'🔇 音效：關（點擊開啟）':'🔊 音效：開（點擊關閉）';SFX.ok()">${muted?"🔇 音效：關（點擊開啟）":"🔊 音效：開（點擊關閉）"}</button>
    <button class="btn ghost block" onclick="const n=prompt('輸入新名字',S.name);if(n){S.name=n.slice(0,12);save();refreshHud();toast('✏️ 名字已更新');closeModal();}">✏️ 修改名字</button>
    <button class="btn ghost block" onclick="speak('Welcome to Word Town! Let us learn English together.')">🗣️ 測試英文發音</button>
    <button class="btn ghost block" onclick="closeModal();openTeacher()">🔑 教師模式</button>
   </div>
   <p style="font-size:12px;color:var(--ink-dim);margin-top:12px;line-height:1.7">
   🎧 若沒有聲音：請確認手機未開靜音模式；發音功能使用瀏覽器內建語音（建議 Chrome / Safari）。<br>
   📱 支援直式與橫式螢幕，旋轉手機即自動切換。</p>`);}

/* ================== 互動與輸入 ================== */
function doAction(){
  if(nearSt){const t=nearSt.t;
    if(t==="B")openTeach(Math.min(tLv,S.unlocked-1));
    else if(t==="P")openPractice();
    else if(t==="Q")openQuiz();
    else if(t==="D")openDash();
    else if(t==="K")openTeacher();}
  else if(nearEv)triggerEvent(nearEv);
  else if(nearNpc)npcTalk();}
actBtn.addEventListener("click",()=>{ac();doAction();});
function bindDir(id,key){const el=document.getElementById(id);
  const on=e=>{e.preventDefault();keys[key]=true;el.classList.add("on");ac();};
  const off=e=>{e.preventDefault();keys[key]=false;el.classList.remove("on");};
  el.addEventListener("pointerdown",on);
  el.addEventListener("pointerup",off);el.addEventListener("pointercancel",off);el.addEventListener("pointerleave",off);}
bindDir("dU","ArrowUp");bindDir("dD","ArrowDown");bindDir("dL","ArrowLeft");bindDir("dR","ArrowRight");
window.addEventListener("keydown",e=>{
  if(modal.classList.contains("show")){if(e.key==="Escape")closeModal();return;}
  if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," ","Enter"].includes(e.key))e.preventDefault();
  if(e.key===" "||e.key==="Enter"){doAction();return;}
  keys[e.key]=true;keys[e.key.toLowerCase()]=true;});
window.addEventListener("keyup",e=>{keys[e.key]=false;keys[e.key.toLowerCase()]=false;});
document.getElementById("btnMission").onclick=openMission;
document.getElementById("btnDash").onclick=openDash;
document.getElementById("btnGear").onclick=openGear;

/* ================== 主迴圈 / 計時 ================== */
let last=performance.now(),started=false;
function loop(now){const dt=Math.min(.05,(now-last)/1000);last=now;
  if(started&&!modal.classList.contains("show"))update(dt);
  draw();requestAnimationFrame(loop);}
requestAnimationFrame(loop);
setInterval(()=>{if(started&&document.visibilityState==="visible"){S.time++;if(S.time%30===0)save();}},1000);

/* ================== 開始畫面 ================== */
const nameIn=document.getElementById("nameInput");
if(S.name)nameIn.value=S.name;
document.getElementById("btnStart").onclick=()=>{
  S.name=(nameIn.value.trim()||"勇者").slice(0,12);save();
  ac();loadV();refreshHud();
  document.getElementById("startScr").style.display="none";
  started=true;SFX.win();
  speak("Welcome to Word Town!");
  setTimeout(()=>toast("📜 按右上角任務書查看目標，走到 📖 單字學堂開始吧！",3800),600);};
refreshHud();
</script>
